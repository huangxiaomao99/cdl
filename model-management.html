            <div class="min-w-[140px] px-5 py-4 rounded-lg border border-slate-200 bg-white peer-checked:border-brand-500 peer-checked:bg-brand-50 transition-all flex items-center gap-2">
              <svg class="w-5 h-5 text-brand-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
              <span class="text-sm font-medium text-slate-700 peer-checked:text-brand-700">gpt-5.2</span>
            </div>
            <svg class="absolute top-2 right-2 w-4 h-4 text-brand-500 opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
          </label>
        </div>
      </div>
    </main>
  </div>

  <!-- 模型提示 Tooltip -->
  <div id="model-tooltip" style="display:none;position:fixed;z-index:99999;left:0;top:0;background-color:#1e293b;color:#fff;font-size:12px;padding:6px 12px;border-radius:6px;white-space:nowrap;pointer-events:none;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">
    模型禁用即时生效，新旧令牌均无法调用。请确保无业务依赖后再操作。
    <span style="position:absolute;left:50%;transform:translateX(-50%);top:100%;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid #1e293b;"></span>
  </div>

  <script>
    // Select all / deselect all
    document.getElementById('select-all').addEventListener('click', () => {
      document.querySelectorAll('input[name="model"]').forEach(cb => cb.checked = true);
    });
    document.getElementById('deselect-all').addEventListener('click', () => {
      document.querySelectorAll('input[name="model"]').forEach(cb => cb.checked = false);
    });

    // Tooltip fixed positioning
    const trigger = document.getElementById('model-tooltip-trigger');
    const tooltip = document.getElementById('model-tooltip');
    if (trigger && tooltip) {
      trigger.addEventListener('mouseenter', () => {
        const rect = trigger.getBoundingClientRect();
        const tipRect = tooltip.getBoundingClientRect();
        let left = rect.left + rect.width / 2 - tipRect.width / 2;
        let top = rect.top - tipRect.height - 6;
        if (left < 8) left = 8;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
        tooltip.style.display = 'block';
      });
      trigger.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
      });
    }
  </script>
</body>
</html>
